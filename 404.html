<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Foodie</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/error.css">
</head>
<body class="error-page-body">

    <section class="error-section min-vh-100 d-flex align-items-center justify-content-center position-relative overflow-hidden">
        <!-- Particle background reusable from your theme -->
        <div class="particle-overlay"></div>
        
        <!-- Floating background icons -->
        <div class="floating-icons d-none d-md-block">
            <i class="fas fa-pizza-slice icon-1"></i>
            <i class="fas fa-hamburger icon-2"></i>
            <i class="fas fa-drumstick-bite icon-3"></i>
            <i class="fas fa-ice-cream icon-4"></i>
        </div>

        <div class="container position-relative" style="z-index: 5;">
            <div class="row justify-content-center">
                <div class="col-lg-8 text-center">
                    <div class="error-glass-card p-4 p-md-5" data-aos="zoom-in">
                        <div class="error-display mb-4">
                            <span class="digit">4</span>
                            <span class="icon-center"><i class="fas fa-hamburger text-primary"></i></span>
                            <span class="digit">4</span>
                        </div>
                        
                        <h2 class="text-white display-4 fw-bold mb-3">Oops! This Page is <span class="text-primary italic-font">Off the Menu</span></h2>
                        <p class="text-white-50 lead mb-5 mx-auto" style="max-width: 500px;">
                            The delicious page you're looking for was either eaten by our hungry chefs or never existed in our kitchen.
                        </p>
                        <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                            <a href="index.html" class="btn btn-main px-5 py-3 rounded-pill shadow-lg">
                                <i class="fas fa-home me-2"></i> Back to Homepage
                            </a>
                            <button onclick="history.back()" class="btn btn-outline-light px-5 py-3 rounded-pill shadow-lg">
                                <i class="fas fa-arrow-left me-2"></i> Go Back
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
    <script src="./js/script.js"></script>
</body>
</html>
