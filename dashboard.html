<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Foodie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">

</head>
<body>
    <div class="dash-sidebar" id="dashSidebar">
        <div class="sidebar-header">
            <img src="assets/images/logoStackly.webp" alt="Logo" style="height: 40px; filter: brightness(0) invert(1);">
        </div>
        <div class="sidebar-nav">
            <div id="navFoodie">
                <a href="dashboard/home.html" class="nav-item-dash active" data-page="home"><i class="fas fa-th-large"></i> Home</a>
                <a href="dashboard/orders.html" class="nav-item-dash" data-page="orders"><i class="fas fa-shopping-bag"></i> My Orders</a>
                <a href="dashboard/favorites.html" class="nav-item-dash" data-page="favorites"><i class="fas fa-heart"></i> Favorites</a>
            </div>
            <div id="navDelivery" style="display:none">
                <a href="dashboard/tasks.html" class="nav-item-dash" data-page="tasks"><i class="fas fa-motorcycle"></i> Active Tasks</a>
                <a href="dashboard/earnings.html" class="nav-item-dash" data-page="earnings"><i class="fas fa-wallet"></i> Earnings</a>
            </div>
            <div id="navAdmin" style="display:none">
                <a href="dashboard/adminOverview.html" class="nav-item-dash"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="dashboard/manageFood.html" class="nav-item-dash"><i class="fas fa-utensils"></i> Menu Management</a>
            </div>
            <hr class="text-white-50">
            <a href="#" id="signoutBtn" class="nav-item-dash text-danger"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
        </div>
    </div>

    <div class="dash-main">
        <header class="dash-header">
            <button class="btn d-lg-none" id="sidebarToggle"><i class="fas fa-bars"></i></button>
            <h5 class="mb-0 fw-bold">Dashboard <span class="badge bg-warning text-dark ms-2" id="roleBadge" style="font-size: 0.7rem;"></span></h5>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end d-none d-sm-block">
                    <div class="fw-bold small" id="navUserName">User Name</div>
                    <div class="text-muted" style="font-size: 0.7rem;" id="navUserEmail">email@example.com</div>
                </div>
                <div class="user-avatar" id="userAvatar">U</div>
            </div>
        </header>
        <iframe src="dashboard/home.html" id="dashFrame"></iframe>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
