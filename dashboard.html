<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Foodie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        :root {
            --sidebar-width: 260px;
            --header-height: 70px;
        }

        body {
            overflow: hidden; /* Prevent body scroll, use iframe/main scroll */
            background-color: #f8fafb;
        }

        /* Sidebar Styling */
        .dash-sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: #012d36;
            z-index: 1050;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        /* Main Content Styling */
        .dash-main {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .dash-header {
            height: var(--header-height);
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            border-bottom: 1px solid #edf2f7;
            flex-shrink: 0;
        }

        #dashFrame {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: calc(100vh - var(--header-height));
        }

        /* Overlay for mobile */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
            z-index: 1040;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }

        /* Mobile Viewport Adjustments */
        @media (max-width: 991.98px) {
            .dash-sidebar {
                transform: translateX(-100%);
            }

            .dash-sidebar.active {
                transform: translateX(0);
            }

            .dash-main {
                margin-left: 0;
                width: 100%;
            }

            #sidebarToggle {
                display: flex !important;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 40px;
                border-radius: 8px;
                background: #f1f5f9;
            }
        }

        @media (max-width: 575.98px) {
            .dash-header { padding: 0 1rem; }
            #navUserName, #navUserEmail {
                display: none; /* Hide text on small screens to prevent overlap */
            }
        }
    </style>
</head>
<body>
    <div class="dash-sidebar" id="dashSidebar">
        <div class="sidebar-header">
            <img src="assets/images/logoStackly.webp" alt="Logo" style="height: 40px; filter: brightness(0) invert(1);">
        </div>
        <div class="sidebar-nav">
            <div id="navFoodie">
                <a href="dashboard/home.html" class="nav-item-dash active" data-page="home"><i class="fas fa-th-large"></i> Home</a>
                <a href="dashboard/orders.html" class="nav-item-dash" data-page="orders"><i class="fas fa-shopping-bag"></i> My Orders</a>
                <a href="dashboard/favorites.html" class="nav-item-dash" data-page="favorites"><i class="fas fa-heart"></i> Favorites</a>
                <p class="text-white-50">Account</p>
                <a href="dashboard/profile.html" class="nav-item-dash" data-page="profile"><i class="fas fa-user"></i> Profile</a>
                <a href="dashboard/settings.html" class="nav-item-dash" data-page="settings"><i class="fas fa-cog"></i> Settings</a>
            
            </div>
            <div id="navDelivery" style="display:none">
                <a href="dashboard/tasks.html" class="nav-item-dash" data-page="tasks"><i class="fas fa-motorcycle"></i> Active Tasks</a>
                <a href="dashboard/earnings.html" class="nav-item-dash" data-page="earnings"><i class="fas fa-wallet"></i> Earnings</a>
                <p class="text-white-50">Account</p>
                <a href="dashboard/profile.html" class="nav-item-dash" data-page="profile"><i class="fas fa-user"></i> Profile</a>
                <a href="dashboard/settings.html" class="nav-item-dash" data-page="settings"><i class="fas fa-cog"></i> Settings</a>
            </div>
            <div id="navAdmin" style="display:none">
                <a href="dashboard/adminOverview.html" class="nav-item-dash" data-page="adminOverview"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="dashboard/manageFood.html" class="nav-item-dash" data-page="manageFood"><i class="fas fa-utensils"></i> Menu Management</a>
                <p class="text-white-50">Account</p>
                <a href="dashboard/profile.html" class="nav-item-dash" data-page="profile"><i class="fas fa-user"></i> Profile</a>
                <a href="dashboard/settings.html" class="nav-item-dash" data-page="settings"><i class="fas fa-cog"></i> Settings</a>
            </div>
            <hr class="text-white-50">
            <a href="#" id="signoutBtn" class="nav-item-dash text-danger"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
        </div>
    </div>

    <div class="dash-main">
        <header class="dash-header">
            <button class="btn d-lg-none" id="sidebarToggle"><i class="fas fa-bars"></i></button>
            <h5 class="mb-0 fw-bold">Dashboard <span class="badge bg-warning text-dark ms-2" id="roleBadge" style="font-size: 0.7rem;"></span></h5>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end d-none d-sm-block">
                    <div class="fw-bold small" id="navUserName">User Name</div>
                    <div class="text-muted" style="font-size: 0.7rem;" id="navUserEmail">email@example.com</div>
                </div>
                <div class="user-avatar" id="userAvatar">U</div>
            </div>
        </header>
        <iframe src="dashboard/home.html" id="dashFrame"></iframe>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('dashSidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            const overlay = document.getElementById('sidebarOverlay');
            const dashFrame = document.getElementById('dashFrame');
            const navItems = document.querySelectorAll('.nav-item-dash');
            const roleBadge = document.getElementById('roleBadge');

            // Load User Data
            const user = JSON.parse(localStorage.getItem('loggedInUser'));
            if (user) {
                document.getElementById('navUserName').textContent = user.name;
                document.getElementById('navUserEmail').textContent = user.email;
                document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
                roleBadge.textContent = user.role;

                // Show correct navigation based on role
                document.getElementById('navFoodie').style.display = user.role === 'Foodie' ? 'block' : 'none';
                document.getElementById('navDelivery').style.display = user.role === 'Delivery' ? 'block' : 'none';
                document.getElementById('navAdmin').style.display = user.role === 'Admin' ? 'block' : 'none';
            }

            // Sidebar Toggle Logic
            function toggleSidebar() {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            }

            toggleBtn?.addEventListener('click', toggleSidebar);
            overlay?.addEventListener('click', toggleSidebar);

            // Iframe Navigation & Active States
            navItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    if (this.id === 'signoutBtn') {
                        localStorage.removeItem('loggedInUser');
                        window.location.href = 'login.html';
                        return;
                    }

                    e.preventDefault();
                    navItems.forEach(nav => nav.classList.remove('active'));
                    this.classList.add('active');
                    dashFrame.src = this.getAttribute('href');
                    if (window.innerWidth < 992) toggleSidebar();
                });
            });
        });
    </script>
</body>
</html>
