<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/error.css">
    <style>
        body {
            background-color: #012d36;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3) !important;
            color: white;
            overflow: hidden;
        }

        .auth-image-side {
            background: url('./assets/images/gl-4.webp') center/cover no-repeat;
            position: relative;
            min-height: 100%;
            height: 100%;
        }

        .auth-image-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(1, 45, 54, 0.2), rgba(1, 45, 54, 0.8));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 3rem;
        }

        .modern-role-selector {
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        .role-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
        }

        .role-item i {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: var(--secondary);
        }

        .btn-check:checked+.role-item {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 65, 18, 0.2);
        }

        .btn-check:checked+.role-item i {
            color: white;
        }

        /* checked */
        .form-check-input:checked {
            background-color: var(--primary) !important;
            border-color: var(--primary) !important;
        }
    </style>
</head>

<body class="error-page-body">

    <!-- Background Elements -->
    <div class="particle-overlay"></div>

    <div class="floating-icons d-none d-md-block">
        <i class="fas fa-pizza-slice icon-1"></i>
        <i class="fas fa-hamburger icon-2"></i>
        <i class="fas fa-drumstick-bite icon-3"></i>
        <i class="fas fa-ice-cream icon-4"></i>
        <i class="fas fa-cookie icon-5"></i>
        <i class="fas fa-apple-whole icon-6"></i>
        <i class="fas fa-hotdog icon-7"></i>
        <i class="fas fa-bacon icon-8"></i>
        <i class="fas fa-cheese icon-9"></i>
        <i class="fas fa-egg icon-10"></i>
    </div>

    <div class="container position-relative py-3" style="z-index: 5;">
        <div class="row justify-content-center">
            <div class="col-lg-11 col-xl-10">
                <div class="auth-card rounded-5" data-aos="zoom-in">
                    <div class="row g-0">
                        <!-- Left: Form Side -->
                        <div class="col-lg-6 p-3 p-lg-4">
                            <div class="text-center mb-2">
                                <a href="index.html" class="text-secondary small text-decoration-none"><i
                                        class="fas fa-arrow-left me-2"></i> Back to Home</a>
                            </div>

                            <div class="text-center mb-2">
                                <h2 class="fw-bold text-white">Register</h2>
                                <p class="text-white-50">Create your account to get started</p>
                            </div>

                            <form id="signupForm">
                                <label class="form-label fw-bold text-white-50">Full Name</label>
                                <input class="form-control mb-3 bg-dark border-secondary text-white" type="text"
                                    id="name" placeholder="e.g., John Doe" pattern="[A-Za-z\s]+"
                                    oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '')" required>

                                <label class="form-label fw-bold text-white-50 mb-2">I am a</label>
                                <div class="modern-role-selector mb-4">
                                    <input type="radio" class="btn-check" name="role" id="regFoodie" value="Foodie"
                                        checked autocomplete="off">
                                    <label class="role-item" for="regFoodie">
                                        <i class="fas fa-utensils"></i>
                                        <span>Foodie</span>
                                    </label>

                                    <input type="radio" class="btn-check" name="role" id="regDelivery" value="Delivery"
                                        autocomplete="off">
                                    <label class="role-item" for="regDelivery">
                                        <i class="fas fa-motorcycle"></i>
                                        <span>Delivery</span>
                                    </label>

                                    <input type="radio" class="btn-check" name="role" id="regAdmin" value="Admin"
                                        autocomplete="off">
                                    <label class="role-item" for="regAdmin">
                                        <i class="fas fa-user-cog"></i>
                                        <span>Admin</span>
                                    </label>
                                </div>

                                <label class="form-label fw-bold text-white-50">Email Address</label>
                                <input class="form-control mb-3 bg-dark border-secondary text-white" type="email"
                                    id="email" placeholder="yourname@example.com" required>

                                <label class="form-label fw-bold text-white-50">Password</label>
                                <div class="input-group mb-1">
                                    <input class="form-control bg-dark border-secondary text-white" type="password"
                                        id="password" placeholder="Create a password (min 8 chars)" minlength="8" required>
                                    <button class="btn btn-outline-secondary toggle-password" type="button">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <!-- Strength bar -->
                                <div class="mb-1"
                                    style="height:4px;border-radius:4px;background:rgba(255,255,255,0.1);overflow:hidden;">
                                    <div id="strengthBar"
                                        style="height:100%;width:0;transition:width 0.3s, background 0.3s;"></div>
                                </div>
                                <div class="mb-3"></div>

                                <label class="form-label fw-bold text-white-50">Confirm Password</label>
                                <div class="input-group mb-1">
                                    <input class="form-control bg-dark border-secondary text-white" type="password"
                                        id="confirmPassword" placeholder="Re-enter your password" required>
                                    <button class="btn btn-outline-secondary toggle-password" type="button">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div id="matchMsg" style="font-size:.76rem;min-height:1.1rem;margin-bottom:.75rem;">
                                </div>

                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" id="terms" required>
                                    <label class="form-check-label small text-white-50" for="terms">
                                        I accept the <a href="404.html"
                                            class="text-secondary fw-bold text-decoration-none">Terms & Conditions</a>
                                    </label>
                                </div>

                                <button class="btn btn-main w-100 mb-3 py-3 fw-bold shadow-lg">Register Account</button>

                                <p class="text-center mb-0 small text-white-50">Already have an account? <a
                                        href="login.html" class="text-secondary fw-bold text-decoration-none">Login
                                        Here</a></p>
                            </form>
                        </div>

                        <!-- Right: Image Side -->
                        <div class="col-lg-6 d-none d-lg-block">
                            <div class="auth-image-side">
                                <div class="auth-image-overlay">
                                    <a href="index.html" class="mb-4">
                                        <img src="assets/images/logoStackly.webp" alt="Logo"
                                            style="height: 60px; filter: brightness(0) invert(1);">
                                    </a>
                                    <h2 class="display-5 fw-bold text-white">Join the Feast!</h2>
                                    <p class="lead text-white-50">Create an account to start your journey with the
                                        freshest food delivery service.</p>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Live password strength + rules
        const pwdInput = document.getElementById('password');
        const confInput = document.getElementById('confirmPassword');
        const bar = document.getElementById('strengthBar');
        const matchMsg = document.getElementById('matchMsg');
        const rules = {
            'r-len': v => v.length >= 8,
            'r-upper': v => /[A-Z]/.test(v),
            'r-num': v => /[0-9]/.test(v),
            'r-sym': v => /[^A-Za-z0-9]/.test(v)
        };
        const colors = ['#ef4444', '#f97316', '#eab308', '#22C55E'];
        const labels = ['Weak', 'Fair', 'Good', 'Strong'];

        pwdInput.addEventListener('input', () => {
            const v = pwdInput.value;
            let passed = 0;
            Object.values(rules).forEach(fn => {
                if (fn(v)) passed++;
            });
            bar.style.width = (passed / 4 * 100) + '%';
            bar.style.background = colors[passed - 1] || 'rgba(255,255,255,0.1)';
            bar.title = labels[passed - 1] || '';
            checkMatch();
        });

        confInput.addEventListener('input', checkMatch);

        function checkMatch() {
            if (!confInput.value) { matchMsg.textContent = ''; return; }
            if (confInput.value === pwdInput.value) {
                matchMsg.style.color = '#22C55E';
                matchMsg.innerHTML = '<i class="fas fa-check-circle me-1"></i>Passwords match';
            } else {
                matchMsg.style.color = '#ef4444';
                matchMsg.innerHTML = '<i class="fas fa-times-circle me-1"></i>Passwords do not match';
            }
        }
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            AOS.init({
                duration: 1000,
                once: true
            });
        });
    </script>

</body>

</html>
