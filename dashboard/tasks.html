<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">Delivery Tasks</h2>
                <p class="page-subtitle">Manage your active pickups and deliveries.</p>
            </div>
            <div class="status active px-3 py-2">Available for Pickup</div>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="content-card h-100">
                    <h5 class="content-card-title">Active Delivery: #FOD-92840</h5>
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="stat-icon orange"><i class="fas fa-utensils"></i></div>
                        <div>
                            <div class="fw-bold">Pickup: Burger King</div>
                            <div class="small text-muted">123 Market St, Suite 5</div>
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="stat-icon green"><i class="fas fa-map-marker-alt"></i></div>
                        <div>
                            <div class="fw-bold">Drop: John Doe</div>
                            <div class="small text-muted">456 Residential Ave, Apt 12</div>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button class="btn-primary-dash py-3">Update Status: Picked Up</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="content-card">
                    <h5 class="content-card-title">Earnings Today</h5>
                    <div class="stat-value">$84.50</div>
                    <p class="stat-label">12 Deliveries Completed</p>
                    <canvas id="earningsChart" height="100"></canvas>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
