<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">My Orders</h2>
                <p class="page-subtitle">Track and manage your gourmet meal history.</p>
            </div>
        </div>

        <div class="content-card">
            <div class="table-wrap">
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Restaurant</th>
                            <th>Date</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td data-label="Order ID">#FOD-92831</td>
                            <td data-label="Restaurant">Pizza Hut</td>
                            <td data-label="Date">Oct 24, 2023</td>
                            <td data-label="Total">$45.00</td>
                            <td data-label="Status"><span class="status active">Delivered</span></td>
                            <td data-label="Action"><button class="btn-outline-dash py-1 px-2">Reorder</button></td>
                        </tr>
                        <tr>
                            <td data-label="Order ID">#FOD-92840</td>
                            <td data-label="Restaurant">Burger King</td>
                            <td data-label="Date">Oct 25, 2023</td>
                            <td data-label="Total">$22.50</td>
                            <td data-label="Status"><span class="status pending">In Transit</span></td>
                            <td data-label="Action"><button class="btn-outline-dash py-1 px-2">Track</button></td>
                        </tr>
                        <tr>
                            <td data-label="Order ID">#FOD-92845</td>
                            <td data-label="Restaurant">Taco Bell</td>
                            <td data-label="Date">Oct 26, 2023</td>
                            <td data-label="Total">$18.00</td>
                            <td data-label="Status"><span class="status cancelled">Cancelled</span></td>
                            <td data-label="Action"><button class="btn-outline-dash py-1 px-2">Support</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
