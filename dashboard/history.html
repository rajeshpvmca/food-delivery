<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">Delivery History</h2>
                <p class="page-subtitle">A detailed log of all your completed journeys.</p>
            </div>
            <div class="dropdown">
                <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button">Filter by Month</button>
            </div>
        </div>

        <div class="content-card">
            <div class="table-wrap">
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>Trip ID</th>
                            <th>Restaurant</th>
                            <th>Destination</th>
                            <th>Distance</th>
                            <th>Earned</th>
                            <th>Rating</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="fw-bold">#TRP-772</td>
                            <td>Pizza Hut (Main)</td>
                            <td>Green Valley, Block C</td>
                            <td>4.2 km</td>
                            <td class="text-success fw-bold">$8.50</td>
                            <td><span class="text-warning"><i class="fas fa-star"></i> 5.0</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
