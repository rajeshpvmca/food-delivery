<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">Welcome Back, <span id="userName">User</span>!</h2>
                <p class="page-subtitle">Here's what's happening with your account today.</p>
            </div>
            <button class="btn-primary-dash">Download Report</button>
        </div>

        <div class="grid-4 mb-4">
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-shopping-cart"></i></div>
                <div>
                    <div class="stat-value">24</div>
                    <div class="stat-label">Total Orders</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fas fa-star"></i></div>
                <div>
                    <div class="stat-value">4.8</div>
                    <div class="stat-label">Average Rating</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-wallet"></i></div>
                <div>
                    <div class="stat-value">$1,240</div>
                    <div class="stat-label">Total Spent</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple"><i class="fas fa-clock"></i></div>
                <div>
                    <div class="stat-value">25m</div>
                    <div class="stat-label">Avg. Delivery</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="content-card">
                    <h5 class="content-card-title">Order Analytics</h5>
                    <canvas id="orderChart" height="150"></canvas>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="content-card">
                    <h5 class="content-card-title">Recent Activity</h5>
                    <ul class="list-unstyled mb-0">
                        <li class="mb-3 d-flex gap-3">
                            <div class="status active"><i class="fas fa-check"></i></div>
                            <div>
                                <div class="fw-bold small">Order Delivered</div>
                                <div class="text-muted extra-small">Pizza Hut - #10293</div>
                            </div>
                        </li>
                        <li class="d-flex gap-3">
                            <div class="status pending"><i class="fas fa-sync"></i></div>
                            <div>
                                <div class="fw-bold small">Out for Delivery</div>
                                <div class="text-muted extra-small">Burger King - #10294</div>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Receive user data from parent
        window.addEventListener('message', (event) => {
            if (event.data.type === 'DASH_USER') {
                const user = event.data.user;
                document.getElementById('userName').textContent = user.name;
            }
        });

        const ctx = document.getElementById('orderChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Orders',
                    data: [12, 19, 15, 25, 22, 30, 28],
                    borderColor: '#ff4112',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(255, 65, 18, 0.05)'
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    </script>
</body>
</html>
