<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">My Favorites</h2>
                <p class="page-subtitle">Quick access to the meals you love the most.</p>
            </div>
        </div>

        <div class="row g-4">
            <!-- Favorite Item 1 -->
            <div class="col-xl-3 col-lg-4 col-md-6">
                <div class="food-card">
                    <div class="food-image">
                        <img src="../assets/images/popular1.webp" class="img-fluid" alt="Pizza">
                        <div class="food-actions">
                            <a href="#" class="action-btn cart-btn">
                                <i class="fa-solid fa-cart-shopping"></i>
                                <span>Add To Cart</span>
                            </a>
                        </div>
                    </div>
                    <div class="food-content text-center">
                        <span class="food-category">CHEESE, PIZZA</span>
                        <h3>Margherita Pizza</h3>
                        <div class="price">$12.00</div>
                        <button class="btn btn-sm text-danger mt-2"><i class="fas fa-heart-broken me-1"></i> Remove</button>
                    </div>
                </div>
            </div>
            <!-- Favorite Item 2 -->
            <div class="col-xl-3 col-lg-4 col-md-6">
                <div class="food-card">
                    <div class="food-image">
                        <img src="../assets/images/popular2.webp" class="img-fluid" alt="Burger">
                        <div class="food-actions">
                            <a href="#" class="action-btn cart-btn">
                                <i class="fa-solid fa-cart-shopping"></i>
                                <span>Add To Cart</span>
                            </a>
                        </div>
                    </div>
                    <div class="food-content text-center">
                        <span class="food-category">CREAMY, BURGER</span>
                        <h3>Beef Burger</h3>
                        <div class="price">$5.00</div>
                        <button class="btn btn-sm text-danger mt-2"><i class="fas fa-heart-broken me-1"></i> Remove</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
